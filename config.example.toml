# Hardlink Organizer — Example Configuration
# Copy this file to config.toml and edit paths to match your environment.
# All path values must point to directories that already exist on the target host.

# ---------------------------------------------------------------------------
# Output paths — Docker deployments
# The /config volume is host-mounted. Leave these as-is for Docker.
# For local Python installs, change to writable paths on your host.
# ---------------------------------------------------------------------------
[paths]
log_file = "/config/hardlink-organizer.log"

# SQLite database for scan history and link operation records.
db_file = "/config/hardlink-organizer.db"

# Optional: CLI scan output files (only used by the CLI scan command, not the web app).
# index_json = "/config/hardlink-index.json"
# index_tsv  = "/config/hardlink-index.tsv"

# ---------------------------------------------------------------------------
# Tool behaviour defaults
# ---------------------------------------------------------------------------
[settings]
# Whether to include hidden top-level entries (names starting with ".")
include_hidden = false

# How to handle destination collisions: "skip" is the only supported policy in v1
collision_policy = "skip"

# ---------------------------------------------------------------------------
# Named source sets — ingress or download roots to scan.
# Each key becomes the source_set name shown in the web UI and CLI.
# Paths must be accessible inside the container (add volume mounts to match).
# ---------------------------------------------------------------------------
[source_sets]
movies     = "/mnt/src/movies"
shows      = "/mnt/src/shows"
audiobooks = "/mnt/src/audiobooks"

# ---------------------------------------------------------------------------
# Named destination sets — library roots to hardlink files into.
# Source and destination sets must resolve to the same physical device.
# ---------------------------------------------------------------------------
[dest_sets]
movies     = "/mnt/dst/movies"
shows      = "/mnt/dst/shows"
audiobooks = "/mnt/dst/audiobooks"

# ---------------------------------------------------------------------------
# Web application settings (used by webapp/run.py; ignored by CLI)
# ---------------------------------------------------------------------------
[webapp]
host  = "0.0.0.0"   # bind address; use 127.0.0.1 for localhost-only
port  = 7700         # default port
debug = false        # set true during development only
