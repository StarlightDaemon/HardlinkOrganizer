# Hardlink Organizer — Unraid Docker Compose
# Place this file anywhere on your Unraid host, then:
#   docker compose -f docker-compose.yml up -d
#
# Before first start:
#   1. Create /mnt/user/appdata/hardlink-organizer/data/
#   2. Copy config.example.toml → /mnt/user/appdata/hardlink-organizer/config.toml
#   3. Edit config.toml — set db_file/log_file to /data/... and source/dest paths
#      to point inside your shared disk mount (see volume notes below).

services:
  hardlink-organizer:
    image: ghcr.io/starlightdaemon/hardlink-organizer:v1.0.0-rc.1
    container_name: hardlink-organizer
    restart: unless-stopped
    ports:
      - "7700:7700"   # host_port:container_port — change host port if needed

    volumes:
      # --- Config file ---
      - /mnt/user/appdata/hardlink-organizer:/config

      # --- State (SQLite DB + logs) ---
      - /mnt/user/appdata/hardlink-organizer/data:/data

      # --- Recommended: single shared disk-level parent mount ---
      # Both source and destination paths must resolve to the same underlying
      # device. The safest way to guarantee this on Unraid is to mount a single
      # disk or pool root and keep both source_sets and dest_sets inside it.
      #
      # Example config.toml entries for this layout:
      #   [source_sets]
      #   movies = "/mnt/disk3/ingress/movies"
      #   [dest_sets]
      #   movies = "/mnt/disk3/media/movies"
      - /mnt/disk3:/mnt/disk3

      # --- Alternative: separate source / destination mounts (higher risk) ---
      # Even when source and destination appear to share the same device ID,
      # separate bind mounts can still fail with EXDEV on Unraid. Prefer the
      # shared parent mount above. Use this layout only if your paths cannot
      # share a common parent.
      #
      # - /mnt/user/ingress/movies:/mnt/src/movies:ro
      # - /mnt/user/ingress/shows:/mnt/src/shows:ro
      # - /mnt/user/ingress/audiobooks:/mnt/src/audiobooks:ro
      # - /mnt/user/media/movies:/mnt/dst/movies
      # - /mnt/user/media/shows:/mnt/dst/shows
      # - /mnt/user/media/audiobooks:/mnt/dst/audiobooks

    environment:
      - PYTHONUNBUFFERED=1
      - PUID=1000   # set to your host user's UID (id -u)
      - PGID=1000   # set to your host user's GID (id -g)

    # Optional: resource limits
    # deploy:
    #   resources:
    #     limits:
    #       memory: 256m
    #       cpus: "0.5"
