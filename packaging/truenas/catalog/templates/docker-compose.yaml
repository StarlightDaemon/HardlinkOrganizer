{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.hlo_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{# HLO entrypoint remaps the hlo OS user to PUID/PGID via gosu at startup #}
{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.healthcheck.set_test("curl", {"port": values.consts.internal_http_port, "path": "/"}) %}

{% do c1.environment.add_env("PUID", values.run_as.user) %}
{% do c1.environment.add_env("PGID", values.run_as.group) %}
{% do c1.environment.add_env("TZ", values.hlo.timezone) %}
{% do c1.environment.add_user_envs(values.hlo.additional_envs) %}

{% if not values.network.host_network %}
  {% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_http_port}) %}
{% endif %}

{# Dedicated config volume — stores config.toml #}
{% do c1.add_storage("/config", values.storage.config) %}
{% do perm_container.add_or_skip_action("/config", values.storage.config, perms_config) %}

{# Dedicated data volume — stores SQLite DB and logs #}
{% do c1.add_storage("/data", values.storage.data) %}
{% do perm_container.add_or_skip_action("/data", values.storage.data, perms_config) %}

{# Additional storage — media source and destination paths #}
{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port, {"path": "/", "port": values.consts.internal_http_port if values.network.host_network else None}) %}

{{ tpl.render() | tojson }}
